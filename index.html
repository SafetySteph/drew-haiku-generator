<!DOCTYPE html>
<html>
  <head>
    <title>Drew Haiku Generator</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Georgia, serif;
        background: linear-gradient(135deg, #dbeafe, #bfdbfe, #93c5fd);
      }

      .card {
        background: #ffffff;
        width: 420px;
        padding: 40px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0, 0, 50, 0.15);
      }

      h1 {
        color: #1e3a8a;
        font-size: 30px;
        margin-bottom: 10px;
      }

      p {
        color: #3b82f6;
        font-size: 16px;
      }

      button {
        background-color: #2563eb;
        color: white;
        border: none;
        padding: 15px 25px;
        font-size: 16px;
        border-radius: 999px;
        cursor: pointer;
        margin-top: 20px;
        transition: 0.3s;
      }

      button:hover {
        background-color: #1d4ed8;
      }

      .result-box {
        margin-top: 25px;
        padding: 20px;
        border-radius: 15px;
        background-color: #eff6ff;
        color: #1e293b;
        font-size: 20px;
        min-height: 100px;
        white-space: pre-line; /* this keeps line breaks */
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Drew Haiku Generator</h1>
      <p>Click to reveal something true about Drew</p>

      <button onclick="generateHaiku()">Generate Haiku</button>

      <div id="result" class="result-box">
Your haiku will appear here
      </div>
    </div>

    <script>
      function generateHaiku() {
        const haikus = [
`Drew the steady light
Kindness moves in quiet ways
He lifts hearts with ease`,

`Tall in more than height
Strength and grace walk side by side
Drew stands firm in truth`,

`Laughter fills the room
His joy makes the weight feel light
A gift to be near`,

`Mind sharp, heart so soft
Wisdom wrapped in gentle care
He sees and he knows`,

`Son of God he walks
With purpose woven in him
Love marks every step`,

`Faithful friend he stays
Showing up in silent ways
That speak louder still`,

`Brother strong and true
Loyal in the in-between
A place you can rest`,

`Drew with quiet fire
Discipline behind the scenes
Strength you cannot fake`,

`Generous by heart
Gives without needing a name
That is who he is`,

`Drew, a rare kind soul
Where humor and depth both meet
A life that feels whole`
        ];

        const randomIndex = Math.floor(Math.random() * haikus.length);

        document.getElementById("result").innerText = haikus[randomIndex];
      }
    </script>
  </body>
</html>
